name = "techfromalex-com"
main = "./dist/_worker.js/index.js"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# Astro SSR output + static assets served from the same Worker.
[assets]
binding = "ASSETS"
directory = "./dist"

[observability]
enabled = true

# --- Bindings -------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "techfromalex_db"
database_id = "7e566884-1306-4b05-aede-aed6ac75548e"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "techfromalex-media"

[[kv_namespaces]]
binding = "RENDER_CACHE"
id = "80763e26397749d5bf3d553b2d2511b3"

# Astro Sessions store (auto-used by @astrojs/cloudflare).
[[kv_namespaces]]
binding = "SESSION"
id = "f2d7567f5fb24d188241a58fbd81324b"

# --- Public vars (non-secret) --------------------------------------------
[vars]
ADMIN_EMAIL = "admin@astroidmedia.com"
SITE_URL = "https://techfromalex.com"
CF_ACCESS_TEAM_DOMAIN = "https://astroid1.cloudflareaccess.com"
CF_ACCESS_AUD = "98b2315edcdf35d95a422225957d218c3d8c02a49f8070c071c5a844dd4d1420"
APIFY_AMAZON_ACTOR = "junglee~amazon-crawler"
# Set to "on" after enabling Cloudflare Image Transformations on the zone (Images -> Transformations).
IMAGE_TRANSFORMS = "off"
# Secrets (ANTHROPIC_API_KEY, APIFY_TOKEN, affiliate keys) via `wrangler secret put`.
